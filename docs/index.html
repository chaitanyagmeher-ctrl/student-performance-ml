<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance - Leaderboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; text-align: center; padding: 50px; }
        h1 { color: #333; }
        table { width: 60%; margin: 0 auto; border-collapse: collapse; background: #fff; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        th, td { padding: 15px; border-bottom: 1px solid #ddd; }
        th { background-color: #4CAF50; color: white; }
        tr:hover { background-color: #f1f1f1; }
        .medal { font-size: 1.5em; }
    </style>
</head>
<body>

    <h1>🎓 Student Performance (Pass/Fail) Leaderboard</h1>
    <p>Predicting student success based on demographic and study data.</p>

    <table>
        <thead>
            <tr>
                <th>Rank</th>
                <th>Participant (GitHub ID)</th>
                <th>F1 Score</th>
                <th>Accuracy</th>
            </tr>
        </thead>
        <tbody id="leaderboard-body">
            </tbody>
    </table>

    <script>
        // Fetch the leaderboard data generated by GitHub Actions
        fetch('leaderboard.json')
            .then(response => response.json())
            .then(data => {
                // Sort by F1 score in descending order
                data.sort((a, b) => b.f1_score - a.f1_score);
                
                const tbody = document.getElementById('leaderboard-body');
                data.forEach((entry, index) => {
                    let rankIcon = index + 1;
                    if (index === 0) rankIcon = "<span class='medal'>🥇</span>";
                    if (index === 1) rankIcon = "<span class='medal'>🥈</span>";
                    if (index === 2) rankIcon = "<span class='medal'>🥉</span>";

                    const row = `<tr>
                        <td>${rankIcon}</td>
                        <td><b>${entry.group}</b></td>
                        <td>${entry.f1_score.toFixed(4)}</td>
                        <td>${entry.accuracy.toFixed(4)}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            })
            .catch(error => console.error('Error loading leaderboard:', error));
    </script>

</body>
</html>
